<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:ROND,opsz,wdth,wght@0..100,6..144,25..150,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style id="user-css"></style>
  </head>
  <body>
    <div id="background">
      <div id="bg-image"></div>
      <div id="bookmarks-container">
        <div id="clock-container">
          <div id="clock"></div>
        </div>
        <div id="bookmarks-grid"></div>
      </div>
    </div>
    <div id="settings-modal">
      <h3>Settings</h3>
      <div class="settings-content">
        <div class="settings-section" data-section="clock">
          <div class="settings-section-header">
            <div class="settings-section-title">Clock</div>
          </div>
          <div class="settings-section-content">
            <div class="settings-section-content-inner">
              <div class="setting-item">
                <label>Format</label>
                <div class="segmented-control" data-setting="clockFormat">
                  <button class="segment-btn active" data-value="12h">12h</button>
                  <button class="segment-btn" data-value="24h">24h</button>
                </div>
              </div>
              <div class="setting-item" id="setting-item-leading-zero">
                <label for="axis-clock-leadingzero">Leading 0</label>
                <label class="switch">
                  <input type="checkbox" id="axis-clock-leadingzero" checked>
                  <span class="switch-slider"></span>
                </label>
              </div>
              <div class="setting-item">
                <label>Separator</label>
                <div class="segmented-control" data-setting="clockSeparator">
                  <button class="segment-btn active" data-value=":">:</button>
                  <button class="segment-btn" data-value=".">.</button>
                  <button class="segment-btn" data-value=" ">[space]</button>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-weight">Weight</label>
                <input type="range" id="axis-weight" min="100" max="1000" value="300">
                <div class="m3-slider" data-input="axis-weight">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-width">Width</label>
                <input type="range" id="axis-width" min="25" max="150" value="100">
                <div class="m3-slider" data-input="axis-width">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-round">Roundness</label>
                <input type="range" id="axis-round" min="0" max="100" value="0">
                <div class="m3-slider" data-input="axis-round">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-size">Size</label>
                <input type="range" id="axis-size" min="30" max="120" value="55">
                <div class="m3-slider" data-input="axis-size">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-section" data-section="bookmarks">
          <div class="settings-section-header">
            <div class="settings-section-title">Bookmarks</div>
          </div>
          <div class="settings-section-content">
            <div class="settings-section-content-inner">
              <div class="setting-item">
                <label for="axis-bm-limit">Limit</label>
                <input type="number" id="axis-bm-limit" min="5" max="1000" value="100">
              </div>
              <div class="setting-item">
                <label for="axis-bm-width">Max Width</label>
                <input type="range" id="axis-bm-width" min="30" max="100" value="80">
                <div class="m3-slider" data-input="axis-bm-width">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-bm-btnsize">Button Size</label>
                <input type="range" id="axis-bm-btnsize" min="24" max="96" value="56">
                <div class="m3-slider" data-input="axis-bm-btnsize">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-bm-iconsize">Icon Size</label>
                <input type="range" id="axis-bm-iconsize" min="12" max="64" value="28">
                <div class="m3-slider" data-input="axis-bm-iconsize">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-bm-showrecents">Show Recents</label>
                <label class="switch">
                  <input type="checkbox" id="axis-bm-showrecents" checked>
                  <span class="switch-slider"></span>
                </label>
              </div>
              <div class="setting-item">
                <label for="axis-bm-showsettings">Show Settings Icon</label>
                <label class="switch">
                  <input type="checkbox" id="axis-bm-showsettings" checked>
                  <span class="switch-slider"></span>
                </label>
              </div>
              <div class="setting-item">
                <label for="axis-bm-topsites" id="label-bm-topsites">Recent Sites</label>
                <input type="range" id="axis-bm-topsites" min="0" max="15" value="5">
                <div class="m3-slider" data-input="axis-bm-topsites">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
              <div class="setting-item">
                <label for="axis-bm-spacing">Spacing</label>
                <input type="range" id="axis-bm-spacing" min="0" max="32" value="5">
                <div class="m3-slider" data-input="axis-bm-spacing">
                  <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                  <div class="m3-slider-thumb"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-section" data-section="background">
          <div class="settings-section-header">
            <div class="settings-section-title">Background</div>
          </div>
          <div class="settings-section-content">
            <div class="settings-section-content-inner">
              <div class="setting-item">
                <label>Source</label>
                <div class="segmented-control" data-setting="backgroundSource">
                  <button class="segment-btn active" data-value="default">Default</button>
                  <button class="segment-btn" data-value="bing">Bing</button>
                  <button class="segment-btn" data-value="unsplash">Curated</button>
                </div>
              </div>
              <div class="bing-only">
                <div class="setting-item">
                  <label>Resolution</label>
                  <div class="segmented-control" data-setting="bingResolution">
                    <button class="segment-btn active" data-value="1920x1080">Native</button>
                    <button class="segment-btn" data-value="UHD">Max</button>
                  </div>
                </div>
              </div>
              <div class="unsplash-only">
                <div class="setting-item unsplash-info">
                  <span>Pulls a daily wallpaper from my curated <a href="https://unsplash.com/collections/LqO9knU9z2A/Likes" target="_blank">Unsplash collection</a>.</span>
                </div>
              </div>
              <div class="custom-bg-only">
                <div class="setting-item">
                  <label for="axis-bg-opacity">Opacity</label>
                  <input type="range" id="axis-bg-opacity" min="0" max="100" value="100">
                  <div class="m3-slider" data-input="axis-bg-opacity">
                    <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                    <div class="m3-slider-thumb"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label for="axis-bg-blur">Blur</label>
                  <input type="range" id="axis-bg-blur" min="0" max="50" value="0">
                  <div class="m3-slider" data-input="axis-bg-blur">
                    <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
                    <div class="m3-slider-thumb"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Developer Section -->
        <div class="settings-section developer-section" id="developer-section" data-section="developer">
          <button class="collapsible-button" id="toggle-developer">
            <div class="developer-card">
              <img src="sameerasw.jpeg" alt="sameerasw" class="developer-img">
              <div class="developer-text">
                <span class="developer-name">Made by sameerasw.com</span>
                <span class="developer-subtitle">with ❤️ from 🇱🇰</span>
              </div>
            </div>
            <svg class="chevron-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="developer-content" class="developer-container collapsed">
            <div class="developer-projects">
              <h4 class="projects-title">Also check out</h4>
              <div class="projects-list">
                <a href="https://sameerasw.com" class="project-button" target="_blank">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                  <span>Website</span>
                </a>
                <a href="https://sameerasw.com/airsync" class="project-button" target="_blank">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                  <span>AirSync - Mac + Android</span>
                </a>
                <a href="https://sameerasw.com/essentials" class="project-button" target="_blank">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                  <span>Essentials - for Android nerds</span>
                </a>
                <a href="https://sameerasw.com/zen" class="project-button" target="_blank">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7zm12 9.8l-2.5-1.4 1.4 2.5-1.4 2.5 2.5-1.4 2.5 1.4-1.4-2.5 1.4-2.5zm0-9.2l-2.5-1.4 1.4 2.5-1.4 2.5 2.5-1.4 2.5 1.4-1.4-2.5 1.4-2.5zM3.4 17.6L17.6 3.4c.4-.4 1-.4 1.4 0l1.6 1.6c.4.4.4 1 0 1.4L6.4 20.6c-.4.4-1.4.2-1.8-.2l-1.2-1.2c-.4-.4-.4-1.2 0-1.6z"/></svg>
                  <span>Zen Zero</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="newtab.js"></script>
  </body>
</html>
