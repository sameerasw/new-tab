<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab Bookmarks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:ROND,opsz,wdth,wght@0..100,6..144,25..150,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style id="user-css"></style>
  </head>
  <body>
    <div id="background">
      <div id="bookmarks-container">
        <div id="clock-container">
          <div id="clock"></div>
        </div>
        <div id="bookmarks-grid"></div>
      </div>
    </div>
    <div id="settings-modal">
      <div class="settings-content">
        <h3>Settings</h3>
        
        <div class="settings-section" data-section="clock">
          <div class="settings-section-title">Clock</div>
          <div class="setting-item">
            <label for="axis-weight">Weight</label>
            <input type="range" id="axis-weight" min="100" max="1000" value="300">
            <div class="m3-slider" data-input="axis-weight">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-width">Width</label>
            <input type="range" id="axis-width" min="25" max="150" value="100">
            <div class="m3-slider" data-input="axis-width">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-round">Roundness</label>
            <input type="range" id="axis-round" min="0" max="100" value="0">
            <div class="m3-slider" data-input="axis-round">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-size">Size</label>
            <input type="range" id="axis-size" min="30" max="120" value="55">
            <div class="m3-slider" data-input="axis-size">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
        </div>

        <div class="settings-section" data-section="bookmarks">
          <div class="settings-section-title">Bookmarks</div>
          <div class="setting-item">
            <label for="axis-bm-width">Max Width</label>
            <input type="range" id="axis-bm-width" min="30" max="100" value="80">
            <div class="m3-slider" data-input="axis-bm-width">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-bm-btnsize">Button Size</label>
            <input type="range" id="axis-bm-btnsize" min="24" max="96" value="56">
            <div class="m3-slider" data-input="axis-bm-btnsize">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-bm-iconsize">Icon Size</label>
            <input type="range" id="axis-bm-iconsize" min="12" max="64" value="28">
            <div class="m3-slider" data-input="axis-bm-iconsize">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>

          <div class="setting-item">
            <label for="axis-bm-topsites">Recent Sites</label>
            <input type="range" id="axis-bm-topsites" min="0" max="15" value="5">
            <div class="m3-slider" data-input="axis-bm-topsites">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
          <div class="setting-item">
            <label for="axis-bm-spacing">Spacing</label>
            <input type="range" id="axis-bm-spacing" min="0" max="32" value="5">
            <div class="m3-slider" data-input="axis-bm-spacing">
              <div class="m3-slider-track"><div class="m3-slider-fill"></div></div>
              <div class="m3-slider-thumb"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      type="text/javascript"
      src="chrome-extension://hfjbmagddngcpeloejdejnfgbamkjaeg/lib/injector.js"
    ></script>
    <script src="newtab.js"></script>
  </body>
</html>
